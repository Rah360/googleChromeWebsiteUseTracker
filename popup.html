<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tracker Status</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="status-app">
      <h1>Website Use Tracker</h1>
      <p id="tracking-status">Tracking is active.</p>
      <p id="active-domain">Current site: -</p>
      <section class="study-mode">
        <p id="study-status">Study mode is off.</p>
        <p id="study-meta">Study time: 0s</p>
        <button id="toggle-study-mode">Start Study Mode</button>
        <p id="play-status">Play mode is off.</p>
        <p id="play-meta">Play time: 0s</p>
        <button id="toggle-play-mode">Start Play Mode</button>
        <button id="mark-distracting">Mark Current Site As Distracting</button>
        <p id="mark-distracting-status" class="hint"></p>
      </section>
      <div class="actions">
        <button id="open-dashboard">Open Dashboard</button>
        <button id="open-settings">Thought Pause Settings</button>
      </div>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
